<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription - Charity Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm mt-5">
                <div class="card-header bg-success text-white text-center py-3">
                    <h4 class="mb-0">Créer un compte</h4>
                </div>
                <div class="card-body p-4">

                    <form th:action="@{/register}" th:object="${userDto}" method="post">

                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

                        <div class="mb-3">
                            <label class="form-label fw-bold">Adresse Email</label>
                            <input type="email" th:field="*{email}" class="form-control" placeholder="nom@exemple.com" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Mot de passe</label>
                            <input type="password" th:field="*{password}" class="form-control" placeholder="Choisissez un mot de passe" required>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Choisissez votre rôle</label>
                            <select th:field="*{role}" class="form-select" required>
                                <option value="" disabled selected>Choisir...</option>
                                <option value="USER">Donateur</option>
                                <option value="ADMIN">Administrateur du site</option>
                                <option value="ORGANISATION">Organisation</option>
                            </select>
                        </div>

                        <div class="d-grid gap-2">
                            <button class="btn btn-success btn-lg" type="submit">S'inscrire</button>
                            <a th:href="@{/login}" class="btn btn-outline-secondary">Déjà un compte ? Se connecter</a>
                        </div>
                    </form>

                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
