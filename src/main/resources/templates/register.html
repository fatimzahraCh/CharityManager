<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Inscription | CharityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .auth-card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        .btn-primary {
            background-color: #4f46e5;
            border: none;
            padding: 0.8rem;
            border-radius: 10px;
            width: 100%;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background-color: #4338ca;
            transform: translateY(-1px);
        }
        .input-group-text {
            background: #f8fafc;
            border-right: none;
            color: #64748b;
        }
        .form-control, .form-select {
            background: #f8fafc;
            border-left: none;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-color: #dee2e6;
            background: #fff;
        }
        .org-section {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 1rem;
            border: 1px dashed #cbd5e1;
        }
    </style>
</head>
<body>
<div class="auth-card shadow-lg">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Créer un compte</h2>
        <p class="text-muted small">Rejoignez notre communauté solidaire</p>
    </div>

    <form th:action="@{/register}" th:object="${userDto}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">NOM DE FAMILLE</label>
            <div class="input-group border rounded-3">
                <span class="input-group-text"><i class="bi bi-person"></i></span>
                <input type="text" th:field="*{lastName}" class="form-control" placeholder="Votre nom" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">ADRESSE EMAIL</label>
            <div class="input-group border rounded-3">
                <span class="input-group-text"><i class="bi bi-at"></i></span>
                <input type="email" th:field="*{email}" class="form-control" placeholder="votre@email.com" required>
            </div>
        </div>

        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">MOT DE PASSE</label>
            <div class="input-group border rounded-3">
                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                <input type="password" th:field="*{password}" class="form-control" placeholder="Minimum 8 caractères" required>
            </div>
        </div>

        <div class="mb-4">
            <label class="form-label small fw-bold text-secondary">VOTRE RÔLE</label>
            <div class="input-group border rounded-3">
                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                <select th:field="*{role}" id="roleSelect" class="form-select" onchange="toggleOrgFields()" required>
                    <option value="" disabled selected>Choisir un profil...</option>
                    <option value="ROLE_USER">Donateur Individuel</option>
                    <option value="ROLE_ORGANISATION">Organisation / Association</option>
                </select>
            </div>
        </div>

        <div id="orgFields" class="org-section" style="display: none;">
            <h6 class="fw-bold text-primary mb-3"><i class="bi bi-building me-2"></i>Détails de l'organisation</h6>

            <div class="mb-3">
                <input type="text" th:field="*{nomOrganisation}" class="form-control border rounded-3" placeholder="Nom de l'organisation">
            </div>
            <div class="mb-3">
                <input type="text" th:field="*{nif}" class="form-control border rounded-3" placeholder="NIF (Identifiant Fiscal)">
            </div>
            <div class="mb-0">
                <input type="text" th:field="*{adresse}" class="form-control border rounded-3" placeholder="Adresse du siège">
            </div>
        </div>

        <button type="submit" class="btn btn-primary text-white mb-3 shadow-sm">S'INSCRIRE MAINTENANT</button>

        <div class="text-center mt-3">
            <p class="small text-muted mb-0">Déjà inscrit ?
                <a th:href="@{/login}" class="fw-bold text-decoration-none" style="color: #4f46e5;">Se connecter ici</a>
            </p>
        </div>
    </form>
</div>

<script>
    function toggleOrgFields() {
        const roleSelect = document.getElementById('roleSelect');
        const orgFields = document.getElementById('orgFields');
        const inputs = orgFields.querySelectorAll('input');

        if (roleSelect.value === 'ROLE_ORGANISATION') {
            orgFields.style.display = 'block';
            inputs.forEach(input => input.setAttribute('required', 'required'));
        } else {
            orgFields.style.display = 'none';
            inputs.forEach(input => input.removeAttribute('required'));
        }
    }
</script>
</body>
</html>
