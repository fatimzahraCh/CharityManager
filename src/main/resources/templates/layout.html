<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>CharityConnect Morocco</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <style>
        :root {
            --brand: #00355f;
            --brand-soft: #006b5a;
            --brand-100: #f8f9fa;
            --danger: #ba1a1a;
            --text-strong: #0f172a;
            font-family: 'Inter', sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--text-strong);
            background: radial-gradient(circle at top left, rgba(0, 53, 95, 0.08), transparent 32%),
                        radial-gradient(circle at bottom right, rgba(0, 107, 90, 0.06), transparent 22%),
                        var(--brand-100);
        }

        .bg-zellige {
            background-image:
                radial-gradient(circle at 1px 1px, rgba(0, 53, 95, 0.08) 1px, transparent 0),
                radial-gradient(circle at 8px 8px, rgba(0, 107, 90, 0.06) 1px, transparent 0);
            background-size: 16px 16px;
        }

        .card-glass {
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid rgba(255, 255, 255, 0.72);
            box-shadow: 0 28px 80px rgba(15, 23, 42, 0.08);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
        }

        .btn-brand {
            background-color: var(--brand);
            border-color: transparent;
            color: #ffffff;
        }

        .btn-brand:hover {
            background-color: #00294a;
            color: #ffffff;
        }

        .hero-glow {
            position: absolute;
            border-radius: 999px;
            filter: blur(72px);
            opacity: 0.55;
        }

        .shadow-soft {
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
        }

        .rounded-3xl {
            border-radius: 2rem !important;
        }

        .rounded-4xl {
            border-radius: 2.5rem !important;
        }

        .max-w-7xl {
            max-width: 1280px;
        }

        .h-12 {
            height: 3rem !important;
        }

        .w-12 {
            width: 3rem !important;
        }

        .tracking-\[0\.35em\] {
            letter-spacing: 0.35em;
        }

        .text-brand-soft {
            color: var(--brand-soft) !important;
        }

        .text-brand-900 {
            color: #00294a !important;
        }

        .text-brand {
            color: var(--brand) !important;
        }

        .text-brand-100 {
            color: #eaf5f1 !important;
        }

        .text-slate-950 {
            color: #0f172a !important;
        }

        .text-slate-900 {
            color: #111827 !important;
        }

        .text-slate-700 {
            color: #334155 !important;
        }

        .text-slate-600 {
            color: #475569 !important;
        }

        .text-slate-500 {
            color: #6b7280 !important;
        }

        .bg-brand {
            background-color: var(--brand) !important;
        }

        .bg-brand-soft {
            background-color: var(--brand-soft) !important;
        }

        .bg-brand-100 {
            background-color: #eff7f4 !important;
        }

        .bg-brand-900 {
            background-color: #00294a !important;
        }

        .bg-brand-900\/10 {
            background-color: rgba(0, 53, 95, 0.1) !important;
        }

        .bg-brand-soft\/10 {
            background-color: rgba(0, 107, 90, 0.1) !important;
        }

        .bg-danger\/10 {
            background-color: rgba(186, 26, 26, 0.1) !important;
        }

        .bg-white\/90 {
            background-color: rgba(255, 255, 255, 0.9) !important;
        }

        .bg-white\/95 {
            background-color: rgba(255, 255, 255, 0.95) !important;
        }

        .border-slate-200\/80 {
            border-color: rgba(226, 232, 240, 0.8) !important;
        }

        .backdrop-blur-xl {
            backdrop-filter: blur(18px);
        }

        .border-brand-soft {
            border-color: var(--brand-soft) !important;
        }

        .inset-x-0 {
            left: 0;
            right: 0;
            position: absolute;
        }

        .z-40 {
            z-index: 40;
        }

        .page-content {
            padding-top: 1rem;
            padding-bottom: 6rem;
        }

        .mobile-nav-spacer {
            height: 84px;
        }

        .progress-pill {
            border-radius: 999px;
        }
    </style>
</head>
<body class="bg-zellige">
<div th:insert="~{fragments/header :: navbar}"></div>

<main class="mx-auto max-w-7xl px-4 page-content">
    <div layout:fragment="content"></div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
