<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>Modifier Donateur</title>
</head>
<body>
<div layout:fragment="content">
    <section class="card-glass p-4 p-lg-5 mb-5">
        <div class="d-flex align-items-center justify-content-between mb-4">
            <div>
                <p class="text-uppercase small tracking-[0.35em] text-brand-soft mb-2">Donateur</p>
                <h1 class="fw-bold">Modifier le compte donateur</h1>
            </div>
            <a th:href="@{/admin/manage}" class="btn btn-outline-secondary btn-sm">Retour</a>
        </div>

        <form th:action="@{/admin/users/{id}/edit(id=${user.id})}" method="post" class="row g-3">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
            <div class="col-12">
                <label class="form-label">Email</label>
                <input type="email" name="email" th:value="${user.email}" class="form-control" required>
            </div>
            <div class="col-12">
                <label class="form-label">Nom</label>
                <input type="text" name="lastName" th:value="${user.lastName}" class="form-control" required>
            </div>
            <div class="col-12">
                <label class="form-label">Nouveau mot de passe</label>
                <input type="password" name="password" class="form-control" placeholder="Laissez vide pour ne pas changer">
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-brand w-100">Enregistrer</button>
            </div>
        </form>
    </section>
</div>
</body>
</html>
