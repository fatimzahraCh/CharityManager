<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion - Charity Connect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow-sm mt-5">
                <div class="card-header bg-primary text-white text-center py-3">
                    <h4 class="mb-0">Charity Connect - Connexion</h4>
                </div>
                <div class="card-body p-4">

                    <div th:if="${param.error}" class="alert alert-danger text-center">
                        Email ou mot de passe incorrect.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success text-center">
                        Vous avez été déconnecté avec succès.
                    </div>

                    <form th:action="@{/login}" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label fw-bold">Adresse Email</label>
                            <input type="email" id="username" name="username" class="form-control" placeholder="exemple@email.com" required autofocus>
                        </div>

                        <div class="mb-4">
                            <label for="password" class="form-label fw-bold">Mot de passe</label>
                            <input type="password" id="password" name="password" class="form-control" required>
                        </div>

                        <div class="d-grid">
                            <button class="btn btn-primary btn-lg" type="submit">Se connecter</button>
                        </div>

                        <div class="text-center mt-3">
                            <p class="mb-0">Pas encore de compte ? <a th:href="@{/register}" class="text-decoration-none fw-bold">S'inscrire ici</a></p>
                        </div>

                    </form>

                </div>
            </div>
        </div>
    </div>
</div>
