<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion | CharityConnect</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8fafc; font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .auth-card { background: white; padding: 2.5rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .btn-primary { background-color: #4f46e5; border: none; padding: 0.8rem; border-radius: 10px; width: 100%; font-weight: bold; transition: 0.3s; }
        .btn-primary:hover { background-color: #4338ca; transform: translateY(-1px); }
        .input-group-text { background: #f8fafc; border-right: none; color: #64748b; }
        .form-control { background: #f8fafc; border-left: none; }
        .form-control:focus { box-shadow: none; border-color: #dee2e6; background: #fff; }
        .register-link:hover { text-decoration: underline !important; }
    </style>
</head>
<body>
<div class="auth-card">
    <div class="text-center mb-4">
        <h2 class="fw-bold">Bon retour !</h2>
        <p class="text-muted small">Accédez à votre espace CharityConnect</p>
    </div>

    <form th:action="@{/login}" method="post">
        <div class="mb-3">
            <label class="form-label small fw-bold text-secondary">ADRESSE EMAIL</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                <input type="email" name="username" class="form-control" placeholder="nom@exemple.com" required>
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label small fw-bold text-secondary">MOT DE PASSE</label>
            <div class="input-group">
                <span class="input-group-text"><i class="bi bi-key"></i></span>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
        </div>

        <button type="submit" class="btn btn-primary text-white mb-3">SE CONNECTER</button>
        <a th:href="@{/}" class="btn btn-outline-secondary w-100 mb-3">Revenir à l'accueil visiteur</a>

        <div class="text-center mt-3">
            <p class="small text-muted mb-0">Pas encore de compte ?
                <a th:href="@{/register}" class="register-link fw-bold text-decoration-none" style="color: #4f46e5;">S'inscrire ici</a>
            </p>
        </div>
    </form>
</div>
</body>
</html>
