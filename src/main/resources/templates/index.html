<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${titrePage}">Accueil</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
        <span class="navbar-brand mb-0 h1">Charity Connect</span>
    </div>
</nav>

<div class="container">
    <h1 class="mb-4">Actions de charité disponibles</h1>

    <div class="row">
        <div class="col-md-4 mb-3" th:each="action : ${actions}">
            <div class="card h-100 shadow-sm">
                <div class="card-body">
                    <h5 class="card-title text-primary" th:text="${action.titre}">Titre de l'action</h5>
                    <p class="card-text text-muted" th:text="${action.description}">Description...</p>
                    <div class="mt-3">
                        <strong>Objectif : </strong> <span th:text="${action.objectifCollecte} + ' DHS'">0</span><br>
                        <strong>Récolté : </strong> <span class="text-success" th:text="${action.sommeActuelle} + ' DHS'">0</span>
                    </div>
                </div>
                <div class="card-footer bg-white border-top-0">
                    <a href="#" class="btn btn-outline-primary w-100">Détails / Faire un don</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
